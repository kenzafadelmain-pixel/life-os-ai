{% extends "auth/_shell.html" %}
{% block title %}Sign in{% endblock %}

{% block auth_content %}
<div class="auth-form-wrap">
  <span class="eyebrow">// authenticate</span>
  <h1>Welcome back.</h1>
  <p class="muted">Sign in to your console — Aurora has been waiting.</p>

  <form method="POST" class="auth-form">
    <div class="field">
      <label for="email">Email</label>
      <input class="input" type="email" name="email" id="email" value="{{ email or '' }}" required autofocus />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input class="input" type="password" name="password" id="password" required minlength="8" />
    </div>
    <button type="submit" class="btn btn--primary btn--block">Enter LIFE OS →</button>
  </form>

  <p class="auth-alt">
    First time here? <a href="{{ url_for('auth.register') }}">Create an account</a>.
  </p>
</div>
{% endblock %}
